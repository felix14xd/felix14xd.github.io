<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Felix_14</title>
    <link rel="shortcut icon" type="image/png" href="images/favicon.png"/>
    <link rel="stylesheet" type="text/css" href="main_style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
</head>
<body>

    <div class="page-container">
        <!-- Логотип страницы -->
        <div class="logo-wrapper">
            <img src="images/logo.png" alt="Felix_14" class="main-logo">
        </div>

        <!-- Основная карточка -->
        <div class="card">
            <h1 class="description">2D Artist</h1>
            

            <hr class="card-divider">

            <!-- Кнопки -->
            <div id="other_buttons">
                <a class="common_button" href="https://gamejolt.com" target="_blank">
                    <img src="images/game_jolt.png" alt="About me" class="button-icon gj-icon">
                </a>

                <a class="common_button" href="https://google.com" target="_blank">
                    <img src="images/google_play.svg" alt="My portfolio" class="button-icon gp-icon">
                </a>

                <a class="common_button" href="https://google.com" target="_blank">
                    <img src="images/google_play.svg" alt="Community" class="button-icon gp-icon">
                </a>
				
                <a class="common_button" href="https://google.com" target="_blank">
                    <img src="images/google_play.svg" alt="My projects" class="button-icon gp-icon">
                </a>

            </div>

            <!-- Связаться со мной -->
            <h2 class="section-title">Contact to me:</h2>

            <div id="other_buttons">
                <a class="common_button" href="https://gamejolt.com" target="_blank">
                    <img src="images/platforms/telegram.png" alt="Telegram" class="button-icon tg-icon">
                </a>

                <a class="common_button" href="https://google.com" target="_blank">
                    <img src="images/platforms/discord.png" alt="Discord" class="button-icon discord-icon">
                </a>

                <a class="common_button" href="https://google.com" target="_blank">
                    <img src="images/platforms/gmail.png" alt="Email" class="button-icon mail-icon">
                </a>

            </div>


            <!-- Копирайт -->
            <div class="copyright">©Felix_14 (2023-2026)</div>
        </div>
    </div>

    <!-- Кнопка переключения языка -->
    <div id="language-switcher">
        <button id="language-button">
            <img id="language-flag" src="languages/en-US.png" alt="Switch language" draggable="false">
        </button>
    </div>

</body>
</html>

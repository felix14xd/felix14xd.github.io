<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix's bad dream</title>
    <link rel="shortcut icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css">
    
	<style>
	@import url('https://googleapis.com');
	</style>
    
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const gallery = document.querySelector('.gallery');
            const galleryItems = document.querySelectorAll('.gallery img');

            // Функция для открытия изображения
            function setupImageClickHandler(img) {
                img.addEventListener('click', () => {
                    openFullImage(img.src);
                });
            }

            // Добавляем обработчики для изначальных изображений
            galleryItems.forEach(setupImageClickHandler);
        });
    </script>
</head>
<body>

    <!-- Главная обертка для всего контента и анимаций (включая облака) -->
    <div id="mainWrapper">

        <!-- Кнопка переключения языка -->
        <div id="language-switcher">
            <button id="language-button">
                <img id="language-flag" src="languages/en-US.png" alt="Switch language" draggable="false">
            </button>
        </div>

        <!-- Область страницы (главный контейнер) -->
        <div class="container">
            
            <!-- Логотип игры -->
            <div class="logo">
                <img id="logo-image" src="images/logo.png" alt="Felix's bad dream">
            </div>

            <!-- Галерея скриншотов -->
            <div class="gallery-container">
                <div class="gallery">
                    <img src="images/screenshots/1.png" alt="1">
                    <img src="images/screenshots/3.png" alt="3">
                    <img src="images/screenshots/2.png" alt="2">
                    <img src="images/screenshots/4.png" alt="4">
                    <img src="images/screenshots/5.png" alt="5">
                    <img src="images/screenshots/5.png" alt="5">
                    <img src="images/screenshots/6.png" alt="6">
                    <img src="images/screenshots/7.png" alt="7">
                    <img src="images/screenshots/8.png" alt="8">
                </div>
            </div>

            <!-- Описание игры -->
            <div class="description">
                <!-- Гифка перед заголовком -->
                <img src="images/background.title.gif" alt="Title" class="background-title-gif">

                <h2 data-key="description.about_title"></h2>
                <p data-key="description.about1"></p>
                <p data-key="description.about2"></p>
                
                <h2 data-key="description.features_of_the_game.title"></h2>
                <p data-key="description.features_of_the_game1"></p>
                <p data-key="description.features_of_the_game2"></p>
                <p data-key="description.features_of_the_game3"></p>
                <p data-key="description.features_of_the_game4"></p>
                <p data-key="description.features_of_the_game5"></p>
            </div>

            <!-- Ссылки на игру -->
            <div class="game-pages-panel">
                <!-- Windows -->
                <div class="buttons-title">
                    <h2 id="play_game_title" style="margin-bottom: 16px;" data-key="play_game.windows"></h2>
                </div>
                
                <ul class="game-pages-list">
                    <li>
                        <a href="https://steampowered.com" target="_blank" class="button-link">
                            <img class="game-link-icon" src="../../images/platfroms/steam_white.png">
                            <div class="game-page-link" data-key="play_game.steam_download"></div>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Копирайт -->
            <div class="footer-content">
                <p>
                    <a href="https://felix_14.github.io" class="footer-link">
                        ©Felix_14 (2025-2026)
                    </a>
                </p>

                <div class="footer-marking">
                    <p data-key="steam.marking" style="opacity: 0.6;"></p>
                </div>
            </div>

        </div> <!-- Конец container (закрывается ПОСЛЕ футера) -->

        <!-- Оверлей полноэкранной галереи -->
        <div class="fullscreen-overlay" id="fullscreen-overlay">
            <span id="close-btn">&times;</span>
            <button id="prev-btn" class="nav-btn">
                <img src="images/button_left.png">
            </button>
            <div class="fullscreen-gallery">
                <img id="fullscreen-image" src="" alt="Увеличенное изображение">
            </div>
            <button id="next-btn" class="nav-btn">
                <img src="images/button_right.png">
            </button>
        </div>

    </div> <!-- Конец mainWrapper -->



    <!-- ==========================================================================
         СКРИПТЫ
         ========================================================================== -->

    <!-- Скрипт 1: Управление галереей скриншотов -->
    <script>
        const gallery = document.querySelector('.gallery');
        const galleryItems = document.querySelectorAll('.gallery img');
        let currentImageIndex = 0;
        const images = Array.from(galleryItems).map(img => img.src);

        function openFullImage(src) {
            const overlay = document.getElementById('fullscreen-overlay');
            const fullscreenImage = document.getElementById('fullscreen-image');
            currentImageIndex = images.indexOf(src);
            fullscreenImage.src = src;
            overlay.style.display = 'flex';
        }

        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            document.getElementById('fullscreen-image').src = images[currentImageIndex];
        }

        function showPrevImage() {
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            document.getElementById('fullscreen-image').src = images[currentImageIndex];
        }

        document.getElementById('next-btn').addEventListener('click', showNextImage);
        document.getElementById('prev-btn').addEventListener('click', showPrevImage);
        document.getElementById('close-btn').addEventListener('click', () => {
            document.getElementById('fullscreen-overlay').style.display = 'none';
        });

        document.getElementById('fullscreen-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('fullscreen-overlay')) {
                document.getElementById('fullscreen-overlay').style.display = 'none';
            }
        });

        document.addEventListener('keydown', (e) => {
            const overlay = document.getElementById('fullscreen-overlay');
            if (overlay.style.display === 'flex') {
                if (e.key === 'ArrowRight') showNextImage();
                if (e.key === 'ArrowLeft') showPrevImage();
                if (e.key === 'Escape') overlay.style.display = 'none';
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;
        const fullscreenImage = document.getElementById('fullscreen-image');

        fullscreenImage.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        fullscreenImage.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const threshold = 50;
            if (touchStartX - touchEndX > threshold) {
                showNextImage();
            } else if (touchEndX - touchStartX > threshold) {
                showPrevImage();
            }
        }
    </script>

    <!-- Скрипт 2: Локализация страницы -->
    <script>
        let translations = {}; 
        let currentLang = 'en-US'; 
        const supportedLanguages = ['en-US', 'ru-RU']; 
        const cisLanguages = ['ru', 'ru-RU', 'uk', 'be']; 
        
        async function loadTranslations(lang) {
            try {
                const response = await fetch(`languages/${lang}.json`); 
                translations = await response.json(); 
                updateContent(); 
            } catch (error) {
                console.error("Файл перевода не найден:", error);
            }
        }

        function updateContent() {
            document.querySelectorAll('[data-key]').forEach(element => {
                const key = element.getAttribute('data-key');
                if (translations[key]) {
                    if (element.tagName === 'IMG') {
                        const userAgent = navigator.userAgent.toLowerCase();
                        const isAndroid = userAgent.includes("android");

                        if (isAndroid && translations[key+'_mobile']) {
                            element.src = translations[key+'_mobile']; 
                        } else {
                            element.src = translations[key+'_pc'] || translations[key]; 
                        }
                    } else {
                        element.textContent = translations[key];
                    }
                }
            });
            
            const flagElement = document.getElementById('language-flag');
            if (flagElement) {
                flagElement.src = `languages/${currentLang}.png`;
            }
        }

        function switchLanguage(lang) {
            if (supportedLanguages.includes(lang)) {
                currentLang = lang;
                loadTranslations(currentLang); 
            }
    }

    // Функция для определения языка браузера
function detectBrowserLanguage() {
    const browserLang = navigator.language || navigator.languages[0];
    if (cisLanguages.includes(browserLang) || (browserLang && browserLang.startsWith('ru'))) {
        return 'ru-RU';
    }
    return 'en-US';
}

const initialLang = detectBrowserLanguage();
switchLanguage(initialLang);

document.getElementById('language-button').addEventListener('click', () => {
    const newLang = currentLang === 'ru-RU' ? 'en-US' : 'ru-RU';
    switchLanguage(newLang);
});

// Инициализируем переменную wrapper прямо перед работой
const wrapper = document.getElementById('mainWrapper');

function createCloud(init = false) {
    if (!wrapper) return;
    const cloud = document.createElement('div');
    cloud.className = 'cloud';
    
    // Случайный выбор картинки облака от cloud1.png до cloud5.png
    cloud.style.backgroundImage = url('images/clouds/cloud${Math.floor(Math.random()*5)+1}.png');
    
    const size = Math.random() * 100 + 150;
    cloud.style.width = size + 'px';
    cloud.style.height = (size / 2) + 'px';
    cloud.style.top = Math.random() * 80 + 'vh';
    cloud.style.animationDuration = (Math.random() * 20 + 30) + 's';
    
    if (init) cloud.style.right = Math.random() * 100 + 'vw';
    
    wrapper.appendChild(cloud);
    cloud.onanimationend = () => cloud.remove();
}

// Запуск логики создания облаков после загрузки DOM
document.addEventListener('DOMContentLoaded', () => {
    if (wrapper) {
        for(let i=0; i<5; i++) createCloud(true);
        setInterval(createCloud, 5000);
    }
});

	

		
</script>

    <!-- Облака -->
    <script>
        // Находим обертку, куда будут складываться облака (в CSS у тебя #mainWrapper)
        const wrapper = document.getElementById('mainWrapper');

        function createCloud(init = false) {
            if (!wrapper) return;
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.backgroundImage = `url('images/clouds/cloud${Math.floor(Math.random()*5)+1}.png')`;
            const size = Math.random() * 100 + 150;
            cloud.style.width = size + 'px'; 
            cloud.style.height = (size / 2) + 'px';
            cloud.style.top = Math.random() * 80 + 'vh';
            cloud.style.animationDuration = (Math.random() * 20 + 30) + 's';
            if (init) cloud.style.right = Math.random() * 100 + 'vw';
            wrapper.appendChild(cloud);
            cloud.onanimationend = () => cloud.remove();
        }

        // Запускаем облака только после того, как DOM полностью загрузился
        document.addEventListener('DOMContentLoaded', () => {
            if (wrapper) {
                for(let i=0; i<5; i++) createCloud(true);
                setInterval(createCloud, 5000);
            }
        });
    </script>

</body>

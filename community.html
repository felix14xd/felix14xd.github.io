<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Felix_14</title>

    <link rel="stylesheet" type="text/css" href="main_style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
</head>
<body>

    <div class="page-container">
        <!-- Логотип страницы -->
        <div class="logo-wrapper">
            <img src="images/logo.png" alt="Felix_14" class="main-logo">
        </div>

        <!-- Основная карточка -->
        <div class="card">
            <!-- Профессия -->
            <h1 class="description" data-key="felix_14.title"></h1>
            

            <hr class="card-divider">

            <!-- Кнопки -->
			<h2 class="section-title" data-key="felix_14.contact_to_me"></h2>

			<div class="community-grid">
				<a class="community-icon-btn" href="https://youtube.com" target="_blank" rel="noopener noreferrer" title="YouTube">
				<img src="../../images/platforms/media/youtube.png" alt="YouTube">
			</a>
				<a class="community-icon-btn" href="https://discord.com" target="_blank" rel="noopener noreferrer" title="Discord">
				<img src="../../images/platforms/media/discord.png" alt="Discord">
			</a>
				<a class="community-icon-btn" href="https://t.me" target="_blank" rel="noopener noreferrer" title="Telegram">
				<img src="../../images/platforms/media/telegram.png" alt="Telegram">
			</a>
				<a class="community-icon-btn" href="https://x.com" target="_blank" rel="noopener noreferrer" title="X (Twitter)">
				<img src="../../images/platforms/media/x.png" alt="X">
			</a>

    <!-- Нижний ряд (3 иконки) -->
    <a class="community-icon-btn" href="https://steamcommunity.com" target="_blank" rel="noopener noreferrer" title="Steam">
        <img src="../../images/platforms/media/steam.png" alt="Steam">
    <!-- </a> -->
    <!-- <a class="community-icon-btn" href="https://tiktok.com" target="_blank" rel="noopener noreferrer" title="TikTok"> -->
        <!-- <img src="../../images/platforms/media/tiktok.png" alt="TikTok"> -->
    <!-- </a> -->
    <a class="community-icon-btn" href="https://dalink.to" target="_blank" rel="noopener noreferrer" title="DaLink">
        <img src="../../images/platforms/media/dalink.png" alt="DaLink">
    </a>
</div>



            <!-- Копирайт -->
            <div class="copyright">©Felix_14 (2023-2026)</div>
        </div>
    </div>

    <!-- Кнопка переключения языка -->
    <div id="language-switcher">
        <button id="language-button">
            <img id="language-flag" src="languages/en-US.png" alt="Switch language" draggable="false">
        </button>
    </div>

    <!-- Скрипт локализации страницы -->
    <script>
    let currentLang = 'en-US'; 
    const supportedLanguages = ['en-US', 'ru-RU']; 
    const cisLanguages = ['ru', 'ru-RU', 'uk', 'be']; 
    let translations = {}; 

    async function loadTranslations(lang) {
        try {
            const response = await fetch(`languages/${lang}.json`); 
            translations = await response.json(); 
            updateContent(); 
        } catch (error) {
            console.error("Ошибка загрузки файла перевода:", error);
        }
    }

    function updateContent() {
        document.querySelectorAll('[data-key]').forEach(element => {
            const key = element.getAttribute('data-key');
            if (translations[key]) {
                if (element.tagName === 'IMG') {
                    // Переводим alt и title (подсказку) для картинок внутри кнопок
                    element.setAttribute('alt', translations[key]);
                    element.setAttribute('title', translations[key]);
                    
                    // Сохраняем логику чужого скрипта для Android-устройств
                    const userAgent = navigator.userAgent.toLowerCase();
                    const isAndroid = userAgent.includes("android");
                    if (isAndroid && translations[key+'_mobile']) {
                        element.src = translations[key+'_mobile']; 
                    } else if (translations[key+'_pc']) {
                        element.src = translations[key+'_pc']; 
                    }
                } else {
                    element.textContent = translations[key];
                }
            }
        });
        
        const flagElement = document.getElementById('language-flag');
        if (flagElement) {
            flagElement.src = `languages/${currentLang}.png`;
        }
    }

    function switchLanguage(lang) {
        if (supportedLanguages.includes(lang)) {
            currentLang = lang;
            loadTranslations(currentLang); 
        }
    }

    function detectBrowserLanguage() {
        const browserLang = navigator.language || navigator.languages[0]; 
        if (cisLanguages.some(lang => browserLang.startsWith(lang))) {
            return 'ru-RU'; 
        }
        return 'en-US'; 
    }

    // Инициализация при старте страницы
    const initialLang = detectBrowserLanguage(); 
    switchLanguage(initialLang); 

    document.getElementById('language-button').addEventListener('click', () => {
        const newLang = currentLang === 'ru-RU' ? 'en-US' : 'ru-RU'; 
        switchLanguage(newLang);
    });
    </script>

</body>
</html>
